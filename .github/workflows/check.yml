name: Check and Test
on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # Build the native target with MSVC + the Windows SDK. mingw's headers ship
      # an incomplete winsock/shellapi surface (missing SO_REUSE_MULTICASTPORT,
      # broken shellapi.h), which the C FFI in the examples needs.
      - name: setup-msvc
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1
      - name: install-ubuntu
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH
      - name: install-windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "MOON_CC=cl" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: post install
        run: |
          moon version --all
          moon update

      - name: moon check
        run: |
          moon check --target all

      - name: moon test
        run: |
          moon test --target all

      - name: lint
        run: |
          moon fmt && git diff --exit-code
          moon info && git diff --exit-code
