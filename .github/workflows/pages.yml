name: Deploy Rabbita asciinema demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry
        run: moon update

      - name: Check library
        run: moon check

      - name: Check demo
        run: moon -C demo/rabbita_asciinema check --target js

      - name: Test demo
        run: moon -C demo/rabbita_asciinema test --target js

      - name: Build demo
        run: moon -C demo/rabbita_asciinema build --target js --release main

      - name: Prepare site
        run: |
          mkdir -p site/demo site/_build
          cp -R demo/rabbita_asciinema site/demo/rabbita_asciinema
          cp -R _build/js site/_build/js
          touch site/.nojekyll
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./demo/rabbita_asciinema/" />
              <title>Ghostty Rabbita asciinema demo</title>
            </head>
            <body>
              <a href="./demo/rabbita_asciinema/">Open Ghostty Rabbita asciinema demo</a>
            </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
